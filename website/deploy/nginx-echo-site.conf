server {
  listen 80;
  server_name _;

  # 网站静态文件（Vite build 产物）
  root /var/www/echo-site;
  index index.html;

  # 下载文件（大文件目录）
  location /downloads/ {
    alias /var/www/echo-downloads/;
    sendfile on;
    tcp_nopush on;
    types {
      application/octet-stream exe;
      application/zip zip;
    }

    # 版本化文件可长缓存（你也可以按需调整）
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # 站点内容 JSON（建议短缓存/不缓存，便于热更新版本信息）
  location /content/ {
    try_files $uri =404;
    add_header Cache-Control "no-store";
  }

  # SPA 路由支持
  location / {
    try_files $uri $uri/ /index.html;
  }
}

